name: Windows release build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/windows-release.yml'
      - 'build/**'
      - 'electron/**'
      - 'public/brand/**'
      - 'scripts/**'
      - 'src/**'
      - 'electron-builder.config.cjs'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Build compact installer
        run: npm run build

      - name: Build full offline installer
        run: npm run build:full

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: NeoDeskPet-Windows-${{ github.sha }}
          if-no-files-found: error
          path: |
            release/*/NeoDeskPet-*-Windows-x64-Setup.exe
            release/*/NeoDeskPet-*-Windows-x64-Setup.exe.blockmap
            release/*/latest.yml
            release/*/full/NeoDeskPet-*-Windows-x64-Full-Setup.exe
            release/*/full/NeoDeskPet-*-Windows-x64-Full-Setup.exe.blockmap
